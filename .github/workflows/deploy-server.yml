name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify frontend build
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          set -euo pipefail

          export NVM_DIR="$HOME/.nvm"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
            nvm use 22 >/dev/null
          fi

          REPO_URL='git@github.com:ImcJoomo/imc-prosperity-4-visualizer.git'
          DEPLOY_BRANCH='master'
          DEPLOY_PATH='/home/ubuntu/imc-prosperity-4-visualizer-live'
          DEPLOY_SERVICE='imc-prosperity-4-visualizer.service'

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            mkdir -p "$(dirname "$DEPLOY_PATH")"
            git clone --branch "$DEPLOY_BRANCH" "$REPO_URL" "$DEPLOY_PATH"
          fi

          cd "$DEPLOY_PATH"
          git fetch origin "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"

          npm ci
          npm run build
          npm --prefix server ci

          sudo systemctl restart "$DEPLOY_SERVICE"
          systemctl is-active "$DEPLOY_SERVICE"
          EOF
